<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión Financiera</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">GF</div>
      <h1>Gestión Financiera</h1>
      <p class="login-sub">Accedé con tu cuenta</p>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary full" id="btn-login">Ingresar</button>
      <button class="btn btn-ghost full" id="btn-register">Crear cuenta</button>
      <p id="login-error" class="error-msg"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="app" class="hidden">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark">GF</div>
        <span class="logo-text">Gestión<br>Financiera</span>
      </div>
      <nav>
        <div class="nav-item active" data-page="movimientos">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.2"/></svg>
          Movimientos
        </div>
        <div class="nav-item" data-page="er">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 12L6 7L9 10L13 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14H14" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Estado de resultados
        </div>
        <div class="nav-item" data-page="flujo">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.2"/><path d="M8 5V8L10 10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          Flujo de fondos
        </div>
      </nav>
      <div class="sidebar-footer">
        <span id="user-email-display"></span>
        <button class="btn-logout" id="btn-logout">Salir</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <h1 id="page-title">Movimientos</h1>
        <button class="btn btn-primary" id="btn-nuevo">+ Nuevo movimiento</button>
      </div>

      <div class="content">

        <!-- MOVIMIENTOS -->
        <div id="page-movimientos" class="page active">
          <div class="stats-grid" id="stats-grid"></div>
          <div class="filters">
            <input type="text" id="search" placeholder="Buscar por detalle, empresa, CUIT...">
            <select id="filter-tipo">
              <option value="">Todos los tipos</option>
              <option value="Ingreso operativo">Ingresos</option>
              <option value="Egreso operativo">Egresos</option>
              <option value="Inversión / Préstamo">Inversiones</option>
              <option value="Tarjeta de crédito">Tarjetas</option>
              <option value="Banco / Transferencia">Bancos</option>
            </select>
            <select id="filter-mes"><option value="">Todos los meses</option></select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Detalle</th>
                  <th>Empresa</th>
                  <th>Cuenta</th>
                  <th>Tipo</th>
                  <th class="r">Monto</th>
                  <th class="r">Neto s/IVA</th>
                  <th class="r">USD</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="tabla-body"></tbody>
            </table>
          </div>
        </div>

        <!-- ESTADO DE RESULTADOS -->
        <div id="page-er" class="page">
          <div class="table-wrap"><table id="er-table"></table></div>
        </div>

        <!-- FLUJO DE FONDOS -->
        <div id="page-flujo" class="page">
          <div class="stats-grid" id="flujo-stats"></div>
          <div class="table-wrap"><table id="flujo-table"></table></div>
        </div>

      </div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">Nuevo movimiento</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Fecha *</label>
          <input type="date" id="f-fecha">
        </div>
        <div class="form-group">
          <label>Tipo *</label>
          <select id="f-tipo">
            <option value="Ingreso operativo">Ingreso operativo</option>
            <option value="Egreso operativo">Egreso operativo</option>
            <option value="Inversión / Préstamo">Inversión / Préstamo</option>
            <option value="Tarjeta de crédito">Tarjeta de crédito</option>
            <option value="Banco / Transferencia">Banco / Transferencia</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Detalle *</label>
          <input type="text" id="f-detalle" placeholder="Descripción del movimiento">
        </div>
        <div class="form-group">
          <label>Empresa / Razón social</label>
          <input type="text" id="f-empresa">
        </div>
        <div class="form-group">
          <label>CUIT</label>
          <input type="text" id="f-cuit" placeholder="XX-XXXXXXXX-X">
        </div>
        <div class="form-group">
          <label>Monto (ARS) *</label>
          <input type="number" id="f-monto" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Monto neto (sin IVA)</label>
          <input type="number" id="f-neto" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Tipo de cambio</label>
          <input type="number" id="f-tc" placeholder="Ej: 1250" step="0.01">
        </div>
        <div class="form-group">
          <label>USD</label>
          <input type="number" id="f-usd" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Clasificación (manual de cuentas)</label>
          <input type="text" id="f-cuenta" placeholder="Ej: 01.01 Caja">
        </div>
        <div class="form-group">
          <label>Comprobante / Documento</label>
          <input type="text" id="f-doc" placeholder="Factura A 0001-00000001">
        </div>
        <div class="form-group full">
          <label>Observaciones</label>
          <textarea id="f-obs" rows="2" placeholder="Notas adicionales..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="btn-cancelar">Cancelar</button>
        <button class="btn btn-primary" id="btn-guardar">Guardar movimiento</button>
      </div>
      <p id="form-error" class="error-msg"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
